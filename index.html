// Disable right click + copy/paste
document.addEventListener("contextmenu", e => e.preventDefault());
document.addEventListener("copy", e => e.preventDefault());
document.addEventListener("cut", e => e.preventDefault());
document.addEventListener("paste", e => e.preventDefault());

// Disable dev tools shortcuts
document.addEventListener("keydown", function (e) {
  if (
    e.key === "F12" ||
    (e.ctrlKey && e.key === "u") ||
    (e.ctrlKey && e.shiftKey && e.key === "I") ||
    (e.ctrlKey && e.shiftKey && e.key === "J")
  ) {
    e.preventDefault();
  }
});

// Detect dev tools (basic)
setInterval(() => {
  const devtools = window.outerHeight - window.innerHeight > 200 ||
                   window.outerWidth - window.innerWidth > 200;

  if (devtools) {
    document.body.innerHTML =
      "<h1 style='text-align:center;color:red;margin-top:50px;'>⚠️ Exam Stopped: Developer Tools Detected</h1>";

}, 1000);

// Tab switch detection
document.addEventListener("visibilitychange", () => {
  if (document.hidden) {
    alert("⚠️ Tab switching detected! Your exam may be invalid.");

});

// Exit fullscreen detection
document.addEventListener("fullscreenchange", () => {
  if (!document.fullscreenElement) {

});

/* ================= VARIABLES ================= */

let questions = [];
let usedQuestions = new Set();
let current = 0;
let score = 0;
let answers = [];
let student = "";
let timer;
let timeLeft = 30;
let examStarted = false;

/* ================= FULLSCREEN ================= */

function goFullScreen(){
  let elem = document.documentElement;
  if (elem.requestFullscreen) elem.requestFullscreen();
}

/* ================= SHUFFLE ================= */

function shuffle(arr){
for(let i=arr.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[arr[i],arr[j]]=[arr[j],arr[i]];
}
return arr;
}

/* ================= START ================= */

function startExam(){

student = document.getElementById("studentName").value;

if(student.trim()==""){
alert("Enter name");
return;
}

examStarted = true;
document.getElementById("studentName").disabled = true;

document.getElementById("startScreen").style.display="none";
document.getElementById("quizBox").style.display="block";

goFullScreen();

/* reset */
current = 0;
score = 0;
answers = [];
usedQuestions.clear();

questions = [];
shuffle(allQuestions);

for(let i=0;i<allQuestions.length;i++){

let qText = allQuestions[i].q;

if(!usedQuestions.has(qText)){
usedQuestions.add(qText);
questions.push(allQuestions[i]);
}

if(questions.length === 80) break;
}

loadQuestion();
}

/* ================= TIMER ================= */

function startTimer(){
clearInterval(timer);
timeLeft = 30;

document.getElementById("timer").innerHTML = "⏱ 30s";

timer = setInterval(()=>{

timeLeft--;
document.getElementById("timer").innerHTML = `⏱ ${timeLeft}s`;

if(timeLeft <= 0){
clearInterval(timer);
autoSkip();
}

},1000);
}

/* ================= LOAD ================= */

function loadQuestion(){

if(current >= questions.length){
showResult();
return;
}

let q = questions[current];

document.getElementById("progress").innerHTML =
`${student} | Q ${current+1}/${questions.length}`;

document.getElementById("question").innerHTML = q.q;

let options = [...q.options];
shuffle(options);

let html = "";

options.forEach(opt=>{
html += `<button class="option" onclick="check(this.innerText)">${opt}</button>`;
});

document.getElementById("options").innerHTML = html;

startTimer();
}

buttons.forEach(b=>{
b.disabled = true;

if(b.innerText === q.answer) b.classList.add("correct");
if(b.innerText === selected && selected !== q.answer) b.classList.add("wrong");
});

answers.push({
q:q.q,
selected,
correct:q.answer,
isCorrect:selected===q.answer
});

if(selected === q.answer) score++;

document.getElementById("score").innerHTML =
`Answered: ${answers.length}`;

setTimeout(next,700);
}

/* ================= AUTO SKIP ================= */

function autoSkip(){

let q = questions[current];

answers.push({
q:q.q,
selected:"(no answer)",
correct:q.answer,
isCorrect:false
});

next();
}

/* ================= NEXT ================= */

function next(){
current++;
loadQuestion();
}

/* ================= RESULT ================= */

function showResult(){

document.getElementById("question").innerHTML =
"🎉 Exam Completed";

document.getElementById("options").innerHTML = "";

let wrong = answers.filter(a => !a.isCorrect).length;

document.getElementById("result").innerHTML = `
<b>Student:</b> ${student}<br>
<b>Total:</b> ${questions.length}<br>
<b>Correct:</b> ${score}<br>
<b>Wrong:</b> ${wrong}<br>
<b>Accuracy:</b> ${(score/questions.length*100).toFixed(2)}%
`;

clearInterval(timer);
}

</script>

</body>
</html>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#4facfe,#00f2fe);

display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.container{
background:#fff;
width:100%;
max-width:900px;
padding:25px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.2);
}

h1{
text-align:center;
margin-bottom:15px;
}

#studentSection{
text-align:center;
}

input{
width:100%;
padding:12px;
margin:10px 0;
font-size:18px;
border:1px solid #ccc;
border-radius:8px;
}

button{
padding:12px 20px;
border:none;
border-radius:10px;
cursor:pointer;
font-size:18px;
}

.startBtn{
background:#27ae60;
color:white;
width:100%;
}

#quizSection{
display:none;
}

#progressText{
font-size:18px;
font-weight:bold;
margin-bottom:10px;
}

.progress{
height:18px;
background:#ddd;
border-radius:20px;
overflow:hidden;
margin-bottom:15px;
}

.progress-bar{
height:100%;
width:0%;
background:#27ae60;
transition:.4s;
}

#timer{
font-size:22px;
font-weight:bold;
text-align:right;
color:#e74c3c;
margin-bottom:15px;
}

#question{
font-size:24px;
font-weight:bold;
margin-bottom:20px;
}

.option{
display:block;
width:100%;
padding:14px;
margin:8px 0;
background:#3498db;
color:white;
border:none;
border-radius:10px;
font-size:18px;
}

.option:hover{
background:#2980b9;
}

.correct{
background:#27ae60!important;
}

.wrong{
background:#e74c3c!important;
}

#scoreBoard{
margin-top:15px;
font-size:20px;
font-weight:bold;
text-align:center;
}

#certificate{
display:none;
padding:30px;
text-align:center;
border:10px solid gold;
border-radius:20px;
}

#certificate h2{
font-size:40px;
color:green;
margin-bottom:20px;
}

#certificate h3{
font-size:28px;
margin:15px 0;
}

#printBtn{
background:#27ae60;
color:white;
margin-top:20px;
}

body{
    user-select:none;
}

/* certificate */
#certificate{
display:none;
padding:20px;
}

.cert-box{
max-width:900px;
margin:auto;
background:white;
padding:40px;
border:10px double gold;
border-radius:20px;
text-align:center;
position:relative;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.cert-box h1{
color:#2c3e50;
margin:10px 0;
font-size:32px;
}

.cert-box h2{
font-size:30px;
color:#27ae60;
margin:20px 0;
border-bottom:2px solid #27ae60;
display:inline-block;
padding:5px 20px;
}

.cert-box h3{
color:#34495e;
margin:10px 0;
}

.line{
color:#555;
font-size:16px;
margin:10px 0;
}

.resultBox{
margin-top:20px;
font-size:18px;
color:#222;
}

.signs{
display:flex;
justify-content:space-between;
margin-top:50px;
flex-wrap:wrap;
gap:20px;
}

.signs div{
border-top:2px solid black;
width:180px;
padding-top:5px;
}

#printBtn{
margin-top:20px;
padding:12px 20px;
border:none;
background:#27ae60;
color:white;
border-radius:10px;
cursor:pointer;
}

/* RESPONSIVE */
@media(max-width:600px){
.cert-box{
padding:20px;
}

.cert-box h1{
font-size:22px;
}

.cert-box h2{
font-size:22px;
}

.signs{
justify-content:center;
}
}

/* PRINT FIX */
@media print{
body *{
visibility:hidden;
}

#certificate, #certificate *{
visibility:visible;
}

#certificate{
position:absolute;
top:0;
left:0;
width:100%;
}
}

</style>

function removeDuplicateQuestions(arr){
    const seen = new Set();

    return arr.filter(q => {
        const key = q.q.trim().toLowerCase();

        if(seen.has(key)){
            return false;
        }

        seen.add(key);
        return true;
    });
}

let questions = removeDuplicateQuestions(allQuestions);
let currentQuestion = 0;
let score = 0;
let timer = 30;
let timerInterval;
let studentName = "";
let reviewData = [];

function shuffleArray(arr){
    for(let i=arr.length-1;i>0;i--){
        const j=Math.floor(Math.random()*(i+1));
        [arr[i],arr[j]]=[arr[j],arr[i]];
    }
    return arr;
}

function startExam(){

    studentName =
    document.getElementById("studentName").value.trim();

    if(studentName===""){
        alert("Please enter student name");
        return;
    }

    document.getElementById("studentSection").style.display="none";
    document.getElementById("quizSection").style.display="block";

    shuffleArray(questions);
    questions = shuffleArray(
    removeDuplicateQuestions(allQuestions)
).slice(0,100);

    loadQuestion();
}

function loadQuestion(){

    if(currentQuestion>=questions.length){
        finishExam();
        return;
    }

    let q = questions[currentQuestion];

    document.getElementById("progressText").innerHTML =
    `Question ${currentQuestion+1} of ${questions.length}`;

    document.getElementById("progressBar").style.width =
    ((currentQuestion/questions.length)*100)+"%";

    document.getElementById("question").innerHTML = q.q;

    let options=[...q.options];
    shuffleArray(options);

    let html="";

    options.forEach(option=>{

        html += `
        <button class="option"
        onclick="checkAnswer('${option}')">
        ${option}
        </button>
        `;

    });

    document.getElementById("options").innerHTML = html;

    startTimer();
}

function startTimer(){

    clearInterval(timerInterval);

    timer = 30;

    document.getElementById("timer").innerHTML =
    `⏳ ${timer}`;

    timerInterval = setInterval(()=>{

        timer--;

        document.getElementById("timer").innerHTML =
        `⏳ ${timer}`;

        if(timer<=0){

            clearInterval(timerInterval);

            let q = questions[currentQuestion];

            reviewData.push({
                question:q.q,
                selected:"No Answer",
                correct:q.answer
            });

            currentQuestion++;

            loadQuestion();
        }

    },1000);
}

function checkAnswer(selected){

    clearInterval(timerInterval);

    let q = questions[currentQuestion];

    let buttons =
    document.querySelectorAll(".option");

    buttons.forEach(btn=>{

        btn.disabled=true;

        if(btn.innerText===q.answer){
            btn.classList.add("correct");
        }

        if(
        btn.innerText===selected &&
        selected!==q.answer
        ){
            btn.classList.add("wrong");
        }

    });

    reviewData.push({
        question:q.q,
        selected:selected,
        correct:q.answer
    });

    if(selected===q.answer){

        score++;

        let sound =
        document.getElementById("correctSound");

        if(sound) sound.play();

    }else{

        let sound =
        document.getElementById("wrongSound");

        if(sound) sound.play();

    }

    document.getElementById("scoreBoard").innerHTML =
    `Score: ${score}`;

    currentQuestion++;

    setTimeout(loadQuestion,1200);
}

function finishExam(){

    document.getElementById("quizSection").style.display="none";

    document.getElementById("certificate").style.display="block";

    let percentage =
    Math.round((score/questions.length)*100);

    document.getElementById("certName").innerHTML =
    studentName;

    document.getElementById("certPercent").innerHTML =
    `Percentage : ${percentage}%`;

    document.getElementById("certStatus").innerHTML =
    percentage>=40 ? "✅ PASS" : "❌ FAIL";

if(cheatCount >= 3){
    document.getElementById("certStatus").innerHTML =
    "❌ FAILED (CHEATING DETECTED)";
}

    let grade="";

    if(percentage>=90){
        grade="🥇 GOLD";
    }
    else if(percentage>=70){
        grade="🥈 SILVER";
    }
    else if(percentage>=50){
        grade="🥉 BRONZE";
    }
    else{
        grade="📚 PARTICIPATION";
    }

    document.getElementById("certGrade").innerHTML =
    `Grade : ${grade}`;

    document.getElementById("certDate").innerHTML =
    new Date().toLocaleDateString();

    localStorage.setItem(
    "examResult",
    JSON.stringify({
        name:studentName,
        score:score,
        percentage:percentage
    }));

    let tbody =
    document.querySelector("#reviewTable tbody");

    let html="";

    reviewData.forEach((r,index)=>{

        html += `
        <tr>
        <td>${index+1}</td>
        <td>${r.question}</td>
        <td>${r.selected}</td>
        <td>${r.correct}</td>
        </tr>
        `;

    });

    tbody.innerHTML = html;

    document.getElementById("reviewSection").style.display =
    "block";
}

document.getElementById("downloadBtn").onclick =
function(){

    const result =
    localStorage.getItem("examResult");

    const blob =
    new Blob([result],{
        type:"application/json"
    });

    const a =
    document.createElement("a");

    a.href =
    URL.createObjectURL(blob);

    a.download =
    "ExamResult.json";

    a.click();
};
